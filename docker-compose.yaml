services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/api/.env
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./front
    ports:
      - "3000:5173"
    volumes:
      - ./front/crypto:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0